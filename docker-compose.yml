version: '3.8'

services:
  # ====== API Gateway ======
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - bot
      - celery
      - monitor
  
  # ====== ربات اصلی ======
  bot:
    build: .
    environment:
      - UTYOB_BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - CUDA_VISIBLE_DEVICES=0,1
    volumes:
      - ./models:/models
      - ./output:/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    command: python bot.py
  
  # ====== Redis Cache ======
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  # ====== RabbitMQ Queue ======
  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  
  # ====== PostgreSQL Database ======
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=utyob
      - POSTGRES_PASSWORD=utyob123
      - POSTGRES_DB=utyob
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  # ====== Celery Workers (8 Worker) ======
  celery:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - CUDA_VISIBLE_DEVICES=0,1
    deploy:
      replicas: 8
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    command: celery -A tasks worker --loglevel=info --concurrency=4
  
  # ====== Prometheus Monitoring ======
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
  
  # ====== Grafana Dashboard ======
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
  
  # ====== Elasticsearch Logs ======
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
  
  # ====== Kibana Log Viewer ======
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  elastic_data:
