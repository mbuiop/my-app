version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: motherbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mother_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motherbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://motherbot:${DB_PASSWORD}@postgres:5432/mother_bot
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  backup:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: |
      sh -c '
      while true; do
        PGPASSWORD=$POSTGRES_PASSWORD pg_dump -h postgres -U motherbot mother_bot > /backups/backup_$(date +\%Y\%m\%d_\%H\%M\%S).sql
        find /backups -name "*.sql" -mtime +30 -delete
        sleep 86400
      done
      '

volumes:
  postgres_data:
  redis_data:
